server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite fingerprints asset filenames, so they can cache forever.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the shell, so a new deploy takes effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths serve the app shell for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
