# Ruff configuration scoped to the Python backend.

# Only lint the backend source tree.
src = ["."]
target-version = "py312"
line-length = 100

# Ignore Alembic migrations
exclude = [
  "alembic",
]

[lint]
select = [
  "E",
  "F",
  "W",
  "I",
  "UP",
  "B",
  "C4",
  "SIM",
  "RET",
  "PIE",
  "PERF",
  "RUF",
  "ASYNC",
  "FAST",
  "DTZ",
  "T20",
  "S",
  "N",
  "TRY004",
  "TRY400",
]
ignore = [
  "E501",
  "S105",
]

[lint.isort]
known-first-party = ["core", "middleware", "models", "services", "utils"]
combine-as-imports = true

[lint.per-file-ignores]
# Allow non-top-level imports and hardcoded 0.0.0.0 bind in the main entrypoint only.
"main.py" = ["E402", "S104"]
# SQLAlchemy declared_attr receives the mapped class; cls is intentional.
"models/base.py" = ["N805"]
# Pytest tests should use normal assert statements.
"tests/**/*.py" = ["S101"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
