[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .

version_locations =
    %(here)s/alembic/versions/core
    %(here)s/alembic/versions/app
path_separator = newline

# Set via the DATABASE_URL environment variable (see alembic/env.py); never
# commit a real connection string here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
